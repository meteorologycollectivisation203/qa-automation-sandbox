services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: buzzhive
      POSTGRES_USER: buzzhive_user
      POSTGRES_PASSWORD: buzzhive_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buzzhive_user -d buzzhive"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:latest
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: "postgres://buzzhive_user:buzzhive_password@db:5432/buzzhive?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://buzzhive_user:buzzhive_password@db:5432/buzzhive
      SECRET_KEY: super-secret-key-for-dev-only-do-not-use-in-prod
      REFRESH_SECRET_KEY: refresh-secret-key-for-dev-only
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      UPLOAD_DIR: /app/uploads
      RATE_LIMIT_PER_MINUTE: "100"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  uploads:
